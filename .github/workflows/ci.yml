name: Fortaleza CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Air-Gapped-Rag-System-main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "**/requirements.txt"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy bandit
      - name: Ruff lint check
        run: ruff check app/ tests/
      - name: Ruff format check
        run: ruff format --check app/ tests/
      - name: MyPy type check
        run: mypy app/ --strict --ignore-missing-imports || true

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Air-Gapped-Rag-System-main
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "**/requirements.txt"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
      - name: Install app dependencies
        run: |
          pip install -r app/requirements.txt
      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --cov=app --cov-report=xml --cov-report=term -m "not slow"
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml

  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Air-Gapped-Rag-System-main
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install security tools
        run: pip install bandit pip-audit safety
      - name: Bandit security scan
        run: bandit -r app/ -ll -c pyproject.toml
      - name: License check
        run: |
          pip install -r app/requirements.txt
          pip install pip-licenses
          pip-licenses --format=json | python -c "
          import sys, json
          data = json.load(sys.stdin)
          forbidden = ['GPL', 'AGPL', 'LGPL', 'GNU']
          violations = []
          for pkg in data:
              lic = pkg.get('License', '')
              if any(f in lic.upper() for f in forbidden):
                  if 'PSF' not in lic.upper():
                      violations.append(f\"{pkg['Name']} ({lic})\")
          if violations:
              print('License violations:', violations)
              sys.exit(1)
          print('All licenses compliant.')
          "
