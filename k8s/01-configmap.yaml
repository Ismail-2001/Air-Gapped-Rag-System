---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fortaleza-config
  namespace: fortaleza
  labels:
    app.kubernetes.io/name: fortaleza-digital
    app.kubernetes.io/component: config
data:
  OLLAMA_BASE_URL: "http://ollama:11434"
  LLM_MODEL: "llama3:8b-instruct-q4_K_M"
  EMBEDDING_MODEL: "BAAI/bge-m3"
  EMBEDDING_DEVICE: "cpu"
  CHUNK_SIZE: "1000"
  CHUNK_OVERLAP: "200"
  TOP_K_RESULTS: "4"
  SIMILARITY_THRESHOLD: "0.7"
  MAX_TOKENS: "2048"
  TOP_K: "40"
  TOP_P: "0.9"
  REQUEST_TIMEOUT: "120"
  FORTALEZA_SESSION_TTL: "480"
  FORTALEZA_AUTH_MODE: "local"
  CHROMA_PERSIST_DIR: "/data/chroma"
  DOCUMENTS_DIR: "/data/documents"
  HF_HUB_OFFLINE: "1"
  TRANSFORMERS_OFFLINE: "1"
  CHROMADB_TELEMETRY: "false"
  ANONYMIZED_TELEMETRY: "false"
  DO_NOT_TRACK: "1"
  CERT_DAYS: "3650"
