---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: fortaleza
  labels:
    app.kubernetes.io/name: fortaleza-digital
    app.kubernetes.io/component: pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fortaleza-data
  namespace: fortaleza
  labels:
    app.kubernetes.io/name: fortaleza-digital
    app.kubernetes.io/component: pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: audit-logs
  namespace: fortaleza
  labels:
    app.kubernetes.io/name: fortaleza-digital
    app.kubernetes.io/component: pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
