---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: airgap-isolation
  namespace: fortaleza
  labels:
    app.kubernetes.io/name: fortaleza-digital
    app.kubernetes.io/component: network-policy
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 11434
        - protocol: TCP
          port: 8501
  egress:
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 11434
        - protocol: TCP
          port: 8501
