---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: fortaleza
  labels:
    app.kubernetes.io/name: fortaleza-digital
    app.kubernetes.io/component: nginx
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27.6-alpine@sha256:b0e5c1e5a3b80cf66a84e4e42138ee9d864eebb9a3b0f8ebcad2e13f9ac42b33
          ports:
            - containerPort: 80
              protocol: TCP
              name: http
            - containerPort: 443
              protocol: TCP
              name: https
          env:
            - name: CERT_DAYS
              valueFrom:
                configMapKeyRef:
                  name: fortaleza-config
                  key: CERT_DAYS
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-ssl
              mountPath: /etc/nginx/ssl
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
      volumes:
        - name: nginx-conf
          configMap:
            name: nginx-config
        - name: nginx-ssl
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: fortaleza
  labels:
    app.kubernetes.io/name: fortaleza-digital
    app.kubernetes.io/component: nginx
spec:
  type: ClusterIP
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
    - port: 443
      targetPort: 443
      protocol: TCP
      name: https
